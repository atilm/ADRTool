name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_path: target/x86_64-unknown-linux-gnu/release/adr
            asset_name: adr-linux-x86_64
            archive_name: adr-linux-x86_64.tar.gz
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_path: target/x86_64-pc-windows-msvc/release/adr.exe
            asset_name: adr-windows-x86_64.exe
            archive_name: adr-windows-x86_64.zip
    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage release asset
        shell: bash
        run: |
          mkdir dist
          cp "${{ matrix.binary_path }}" "dist/${{ matrix.asset_name }}"
          mkdir -p dist/package/completions
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "${{ matrix.binary_path }}" dist/package/adr.exe
          else
            cp "${{ matrix.binary_path }}" dist/package/adr
          fi
          for shell in bash zsh fish powershell; do
            "${{ matrix.binary_path }}" completion "$shell" > "dist/package/completions/adr.$shell"
          done

      - name: Create Linux archive
        if: runner.os == 'Linux'
        run: tar -czf "dist/${{ matrix.archive_name }}" -C dist/package .

      - name: Create Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/package/* -DestinationPath "dist/${{ matrix.archive_name }}"

      - name: Upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: dist/*

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*